name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate manifest
        run: jq empty manifest.json

      - name: Package extension
        run: |
          set -euo pipefail

          package_name="ip-geolocation-chrome-extension-${GITHUB_REF_NAME}.zip"
          mkdir -p dist

          zip -r "dist/${package_name}" \
            manifest.json \
            background.js \
            popup.html \
            popup.js \
            map.html \
            map.js \
            leaflet.css \
            leaflet.js \
            icon.png \
            images

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          package_path="dist/ip-geolocation-chrome-extension-${GITHUB_REF_NAME}.zip"

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${package_path}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${package_path}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
